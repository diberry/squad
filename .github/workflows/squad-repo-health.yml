name: Repo Health

on:
  pull_request_target:
    branches: [dev]
    types: [opened, synchronize, reopened]

# pull_request_target gives write token even for fork PRs.
# SAFETY: We check out PR code but only run our own trusted scripts that
# read files and output JSON — they never execute arbitrary PR code.
permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─── Bootstrap Protection (BLOCKING) ────────────────────────────────
  bootstrap-protection:
    name: Bootstrap Protection
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          sparse-checkout: |
            packages/squad-cli/src/cli/core/
            scripts/check-bootstrap-deps.mjs
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check bootstrap dependencies
        id: bootstrap
        run: |
          set +e
          OUTPUT=$(node scripts/check-bootstrap-deps.mjs 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

  # ─── Squad File Leakage (WARNING) ───────────────────────────────────
  squad-leakage:
    name: Squad File Leakage
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Detect .squad/ leakage
        id: leakage
        run: |
          git fetch origin dev --quiet
          OUTPUT=$(node scripts/check-squad-leakage.mjs origin/dev 2>&1)
          echo "$OUTPUT"
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Comment on leakage
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { run } = await import(`${process.env.GITHUB_WORKSPACE}/scripts/repo-health-comment.mjs`);
            await run({
              github,
              context,
              output: `${{ steps.leakage.outputs.result }}`,
              job: 'leakage',
            });

  # ─── Architectural Review (INFORMATIONAL) ───────────────────────────
  architectural-review:
    name: Architectural Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run architectural review
        id: arch
        run: |
          git fetch origin dev --quiet
          OUTPUT=$(node scripts/architectural-review.mjs origin/dev 2>&1)
          echo "$OUTPUT"
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Comment on findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { run } = await import(`${process.env.GITHUB_WORKSPACE}/scripts/repo-health-comment.mjs`);
            await run({
              github,
              context,
              output: `${{ steps.arch.outputs.result }}`,
              job: 'architectural',
            });

  # ─── Security Review (INFORMATIONAL) ────────────────────────────────
  security-review:
    name: Security Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run security review
        id: security
        run: |
          git fetch origin dev --quiet
          OUTPUT=$(node scripts/security-review.mjs origin/dev 2>&1)
          echo "$OUTPUT"
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Comment on findings
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { run } = await import(`${process.env.GITHUB_WORKSPACE}/scripts/repo-health-comment.mjs`);
            await run({
              github,
              context,
              output: `${{ steps.security.outputs.result }}`,
              job: 'security',
            });
