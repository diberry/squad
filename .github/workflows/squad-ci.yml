name: Squad CI

on:
  pull_request:
    branches: [main, bradygaster/dev, insider]
    types: [opened, synchronize, reopened]
  push:
    branches: [main, bradygaster/dev, insider]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  # Rollup job that branch protection can reference by exact name
  ci:
    if: always()
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.build.result }}" != "success" || "${{ needs.test.result }}" != "success" ]]; then
            echo "CI failed: build=${{ needs.build.result }}, test=${{ needs.test.result }}"
            exit 1
          fi
          echo "✅ All checks passed"
