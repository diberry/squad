name: Squad Link Check

on:
  pull_request:
    branches: [dev, main]
    paths:
      - '**.md'
      - '**.mdx'
      - 'docs/**'
      - '.lychee.toml'

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --config .lychee.toml
            '**/*.md'
            '**/*.mdx'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
